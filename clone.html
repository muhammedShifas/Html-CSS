<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="clone.css">
</head>
<body>
     <div class="loginbox">
                <h2 class="formtitle">Log in to Facebook</h2>
                
                <form action="#" method="POST">
                    <div class="inputgroup">
                        <input type="text" placeholder="Email address or mobile number" required aria-label="Email address or mobile number">
                    </div>
                    <div class="inputgroup">
                        <input type="password" placeholder="Password" required aria-label="Password">
                    </div>
                    
                    <button type="submit" class="btnlogin">Log In</button>
                    
                    <a href="#" class="forgetlink">Forgotten password?</a>
                    <hr class="separator">
                    <div class="createcontainer">
                        <a href="#">Create new account</a>
                    </div>
                </form>
            </div>
</body>
</html>
