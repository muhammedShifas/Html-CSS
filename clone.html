<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="clone.css">
</head>
<body>
       <main class="container">
        <section class="left-section">
            <div class="brand-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/2023_Facebook_icon.svg" alt="Facebook Logo" class="fb-logo">
                <h1 class="headline">Explore the<br>things <span class="blue-text">you love.</span></h1>
                
                <div class="collage-container">
                    <img src="https://via.placeholder.com/400x400" alt="Collage Graphic" class="collage-img">
                </div>
            </div>
        </section>
        <section class="rightsection">
     <div class="loginbox">
                <h2 class="formtitle">Log in to Facebook</h2>
                
                <form action="#" method="POST">
                    <div class="inputgroup">
                        <input type="text" placeholder="Email address or mobile number" required aria-label="Email address or mobile number">
                    </div>
                    <div class="inputgroup">
                        <input type="password" placeholder="Password" required aria-label="Password">
                    </div>
                    
                    <button type="submit" class="btn btnlogin">Log In</button>
                    
                    <a href="#" class="forgetlink">Forgotten password?</a>
                    <hr class="separator">
                    <div class="createcontainer">
                        <a href="#" class="btn btncreate">Create new account</a>
                    </div>
                </form>
            </div>
             <footer class="meta-footer">
                <span class="meta-logo"><span style="color: #1877f2;">∞</span> Meta</span>
            </footer>
        </section>
       </main>          
</body>
</html>
