<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>google-clone</title>
    <link rel="stylesheet" href="googlestyles.css">
</head>
<body>
    <div class="bar">
        <div class="box">
            <h5 class="under">About</h5>
            <h5 class="under">Store</h5>
        </div>
        <div class="box2">
            <h5 class="under">Gmail</h5>
            <h5 class="under">Images</h5>
            <div class="image">
                <div class="image1"><img src="beaker.svg" alt="beakerlogo"></div>
                <div class="image2"><img src="appsicon.svg" alt="applogo"></div>
            </div>
            <div class="circle">
            <img src="download.jpg" alt="profile">
            </div>
            
        </div>
    </div>
    <div class="gif">
        <img src="google.gif" alt="giff">
        <div class="image3">
            <img src="share.svg" alt="sharebutton"> 
        </div>
        
    </div>
    <div>
        <div class="inputbox">
            <form action="#" method="post">
                <input type="text">
            </form>
            <div class="position"><img src="addicon.svg" alt=""></div>
             <div class="position2"><img src="micicon.svg" alt=""></div>
             <div class="position3"><img src="imagesearch.svg" alt=""></div>
             <div>  <button class="ai-mode">AI Mode</button></div>
        </div>
    </div>
    <div class="buttons">
        <div><button class="bttn">Google Search</button></div>
        <div><button class="bttn">Iam feeling lucky</button></div>
    </div>
</body>
</html>
