<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hovering effect</title>
    <style>
      
        :root{
            --clr: black;
            --fs: 10px;
            --fw: 800;
            --bgc: rgb(40, 109, 47);
            --bgc1: rgb(17, 85, 35);
        }
        h1{
            color: var(--clr);
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px;
            font-weight: bolder;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
        }
        .container{
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 400px;
            height: 200px;
            background-color: var(--bgc1);
            border-radius: 8px;
            border: 1px solid var(--bgc1);
        }

        .container button{
            width: 90px;
            height: 30px;
            background-color: var(--bgc);
            border: 1px solid var(--bgc1);
            border-radius: 8px;
        }
        button:hover{
            width: 90px;
            height: 30px;
            background-color:var(--bgc1);
            border: 2px solid var(--bgc);
            border-radius: 8px;           
        }
        .container:hover{
            border: 2px solid var(--bgc);
        }
        #hover-word{
            color: rgb(0, 0, 0);
            cursor: pointer;
            transition: 0.3s ease;
        }

        #hover-word:hover{
            color: blue;
            text-shadow: 0 0 10px rgba(52, 201, 255, 0.7);
        }

    </style>
</head>
<body><center>
    <h1>The Represtaion Of <span  id="hover-word">Hovering</span> Effect</h1>
    <div class="container">
       
            <form action="#">
        <button class="btn1">Click1</button>
        <button class="btn2">Click2</button>
        <button class="btn3">Click3</button>
        <button class="btn4">Click4</button>
     </form>
       
     

    </div>
    </center>
</body>
</html>
