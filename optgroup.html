<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option group</title>
</head>
<body>
    <h1>Here the representation of option group tag</h1>
    <select>
    <optgroup label="Cars">
        <option>swift</option>
        <option>Alto</option>
    </optgroup>

    <optgroup label="Bike">
        <option>NS</option>
        <option>Rider</option>
    </optgroup>
    </select>
</body>
</html>
