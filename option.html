<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option tag</title>
</head>
<body>
    <h1>Choose a color</h1>
    <select name="color" id="color">
        <option>Red</option>
        <option>Yellow</option>
        <option>BLue</option>
    </select>
</body>
</html>
