<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --bgc: rgb(61, 239, 70);
            --fs: 50px;
            --c: rgb(9, 66, 6);
            --fw: bold;
            --fm: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }
        .btn1{
            width: 150px;
            height: 75px;
            background-color: var(--bgc);
            font-family: var(--fm);
            font-size: var(--fs);
            font-weight: var(--fw);
            color: var(--c);
            border-radius: 5px;
        }
        .btn2{
            width: 150px;
            height: 75px;
            background-color: var(--bgc);
            font-family: var(--fm);
            font-size: var(--fs);
            font-weight: var(--fw);
            color: var(--c);
            border-radius: 5px;
        }
        .btn3{
            width: 150px;
            height: 75px;
            background-color: var(--bgc);
            font-family: var(--fm);
            font-size: var(--fs);
            font-weight: var(--fw);
            color: var(--c);
            border-radius: 5px;
        }
        .btn4{
            width: 150px;
            height: 75px;
            background-color: var(--bgc);
            font-family: var(--fm);
            font-size: var(--fs);
            font-weight: var(--fw);
            color: var(--c);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <button class="btn1">click 1</button>
    <button class="btn2">click 2</button>
    <button class="btn3">click 3</button>
    <button class="btn4">click 4</button>
</body>
</html>
